name: Docker Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  delete-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Get PR preview image version ID
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_ID=$(gh api \
            /orgs/${{ github.repository_owner }}/packages/container/litara/versions \
            --jq ".[] | select(.metadata.container.tags[] == \"pr-${{ github.event.number }}\") | .id" \
            2>/dev/null || true)
          echo "version-id=$VERSION_ID" >> $GITHUB_OUTPUT

      - name: Delete PR preview image
        if: steps.get-version.outputs.version-id != ''
        uses: actions/delete-package-versions@v5
        with:
          package-name: litara
          package-type: container
          token: ${{ secrets.GITHUB_TOKEN }}
          package-version-ids: ${{ steps.get-version.outputs.version-id }}

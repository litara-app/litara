<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; script-src 'self'; style-src 'self' blob: 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' blob: data:; frame-src blob: data:; object-src blob: data:; form-action 'none';">
<title>Reader</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg, #fff); color: var(--fg, #000); }
  foliate-view { width: 100%; height: 100%; display: block; }
  #error { display: none; padding: 2rem; font-family: system-ui, sans-serif; color: #c00; }

  /* Search bar overlay */
  #search-bar {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--bg, #fff);
    border-bottom: 2px solid var(--fg, #000);
    padding: 6px 8px;
    gap: 6px;
    align-items: center;
    font-family: system-ui, sans-serif;
    font-size: 14px;
  }
  #search-bar.open { display: flex; }
  #search-input {
    flex: 1;
    border: 1px solid var(--fg, #000);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 14px;
    background: var(--bg, #fff);
    color: var(--fg, #000);
    outline: none;
  }
  #search-input:focus { outline: 2px solid #4a9eff; }
  #search-count { font-size: 12px; opacity: 0.7; min-width: 60px; text-align: center; white-space: nowrap; }
  #search-bar button {
    border: none;
    background: none;
    color: var(--fg, #000);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 16px;
    opacity: 0.8;
  }
  #search-bar button:hover { opacity: 1; background: rgba(128,128,128,0.15); }

  /* Footnote popup */
  #footnote-popup {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    max-height: 40%;
    background: var(--bg, #fff);
    color: var(--fg, #000);
    border-top: 2px solid var(--fg, #000);
    font-family: system-ui, sans-serif;
    font-size: 14px;
    flex-direction: column;
  }
  #footnote-popup.open { display: flex; }
  #footnote-popup-header {
    display: flex;
    justify-content: flex-end;
    padding: 4px 8px;
    border-bottom: 1px solid rgba(128,128,128,0.3);
    flex-shrink: 0;
  }
  #footnote-popup-close {
    border: none;
    background: none;
    color: var(--fg, #000);
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 16px;
    opacity: 0.7;
  }
  #footnote-popup-close:hover { opacity: 1; background: rgba(128,128,128,0.15); }
  #footnote-popup-content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  #footnote-popup-content foliate-view {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>

<div id="search-bar">
  <input id="search-input" type="search" placeholder="Search in book…" autocomplete="off">
  <span id="search-count"></span>
  <button id="search-prev" title="Previous result (Shift+Enter)">&#8249;</button>
  <button id="search-next" title="Next result (Enter)">&#8250;</button>
  <button id="search-close" title="Close search (Escape)">&#10005;</button>
</div>
<foliate-view id="view"></foliate-view>
<div id="error"></div>

<div id="footnote-popup">
  <div id="footnote-popup-header">
    <button id="footnote-popup-close" title="Close (Escape)">&#10005;</button>
  </div>
  <div id="footnote-popup-content"></div>
</div>

<script type="module" src="./reader-init.js"></script>

# ─── Litara – self-hosted ebook library ───────────────────────────────────────
#
# Quick start:
#   1. Copy this file:  cp docker-compose.example.yml docker-compose.yml
#   2. Change the passwords marked with CHANGE_ME
#   3. Set EBOOK_LIBRARY_PATH (or adjust the books volume mount below)
#   4. Run:  docker compose up -d
#
# The app will be available at http://localhost:3000
# API docs are at http://localhost:3000/docs
# ──────────────────────────────────────────────────────────────────────────────

services:
  litara:
    image: ghcr.io/litara-app/litara:latest
    hostname: litara
    container_name: litara
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:CHANGE_ME@postgres:5432/litara
      JWT_SECRET: CHANGE_ME_use_a_long_random_string
      # GOOGLE_BOOKS_API_KEY: your_key_here   # optional, raises rate limit
      # HARDCOVER_API_KEY: your_key_here      # optional, enables Hardcover metadata
    volumes:
      - ./books:/books    # point this to your local ebook directory
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: litara-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: litara
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
